llm:
  # Stable model routing (Gemini 2.5 family):
  # - flash-lite: bulk/high-throughput stages
  # - flash: balanced quality stages (extraction/writing/humanizer)
  # - pro: reserved for optional premium-quality stages
  # Values are conservative relative to paid-tier limits in AI Studio.
  flash_rpm: 60
  flash_lite_rpm: 120
  pro_rpm: 20
  # Per-request HTTP timeout in seconds. Pro-tier writing/quality calls can take
  # 60-120s for large outputs; 504 DEADLINE_EXCEEDED errors indicate this needs raising.
  request_timeout_seconds: 180
  # Pricing fallback for models that may not yet exist in genai-prices.
  # Key is bare model ref (without provider prefix).
  price_fallback_per_mtok:
    gemini-3.1-flash-lite-preview:
      input_per_mtok: 0.25
      output_per_mtok: 1.50
      cache_read_input_multiplier: 0.10

agents:
  screening_reviewer_a:
    model: "google-gla:gemini-2.5-flash-lite"
    temperature: 0.1
  screening_reviewer_b:
    model: "google-gla:gemini-2.5-flash"
    temperature: 0.1
  screening_adjudicator:
    model: "google-gla:gemini-2.5-flash"
    temperature: 0.2
  search:
    model: "google-gla:gemini-2.5-flash-lite"
    temperature: 0.1
  extraction:
    model: "google-gla:gemini-2.5-flash"
    temperature: 0.1
  quality_assessment:
    model: "google-gla:gemini-2.5-flash"
    temperature: 0.2
  study_type_detection:
    model: "google-gla:gemini-2.5-flash-lite"
    temperature: 0.2
  writing:
    model: "google-gla:gemini-2.5-flash"
    temperature: 0.2
  abstract_generation:
    model: "google-gla:gemini-2.5-flash-lite"
    temperature: 0.2
  humanizer:
    model: "google-gla:gemini-2.5-flash"
    temperature: 0.3
  contradiction_resolver:
    model: "google-gla:gemini-2.5-flash"
    temperature: 0.2
  criteria_refinement:
    model: "google-gla:gemini-2.5-flash"
    temperature: 0.2
  table_extraction:
    model: "google-gla:gemini-2.5-flash-lite"
    temperature: 0.1
  config_generation:
    model: "google-gla:gemini-2.5-flash-lite"
    temperature: 0.3
  batch_screener:
    model: "google-gla:gemini-2.5-flash-lite"
    temperature: 0.1
  concept_diagrams:
    model: "google-gla:gemini-2.5-flash-lite"
    temperature: 0.3
  narrative:
    model: "google-gla:gemini-2.5-flash-lite"
    temperature: 0.2
  citation_matching:
    model: "google-gla:gemini-2.5-flash-lite"
    temperature: 0.0

screening:
  stage1_include_threshold: 0.85
  stage1_exclude_threshold: 0.8
  keyword_filter_min_matches: 0
  # Deterministic pre-LLM guards.
  auto_exclude_empty_abstract: true
  secondary_review_patterns:
    - "systematic review"
    - "scoping review"
    - "narrative review"
    - "umbrella review"
    - "meta-analysis"
    - "meta analysis"
  protocol_only_patterns:
    - "study protocol"
    - "trial protocol"
    - "protocol for"
    - "study design and methods"
    - "trial registration"
    - "prospero protocol"
  deterministic_allowlist_patterns: []
  deterministic_exclude_qa_sample_size: 20
  # False-exclusion safeguard: allow a small number of empty-abstract title-only rescues.
  empty_abstract_rescue_sample_size: 5
  empty_abstract_rescue_keyword_min_matches: 2
  # true: papers without retrievable full text are auto-excluded at the full-text
  # screening stage with ExclusionReason.NO_FULL_TEXT. PRISMA 2020 item 17 requires
  # a "Reports not retrieved" box; without this gate that count is always 0 and
  # papers screened on abstract alone are incorrectly included in synthesis.
  # Note: this may exclude paywalled papers with no open-access PDF; those papers
  # should appear in the PRISMA flow as "not retrieved" rather than as included studies.
  skip_fulltext_if_no_pdf: true
  screening_concurrency: 5
  # Number of PDFs fetched concurrently during full-text retrieval (phase 3).
  # Each fetch hits a different upstream host (Unpaywall, CORE, Semantic Scholar,
  # Europe PMC) so 20 concurrent requests do not hammer any single service
  # (all are I/O-bound async calls to distinct hosts).
  # Lower to 8-10 if rate-limit errors appear in the activity log.
  pdf_retrieval_concurrency: 20
  # Maximum wall-clock time (seconds) allowed for one paper's full retrieval
  # across all tiers. Prevents a slow-responding host from holding a semaphore
  # slot for 260s (13 tiers x 20s). Paper is marked failed-timeout and moves on.
  pdf_retrieval_per_paper_timeout: 45
  # Fixed dual-review cap for cost control.
  max_llm_screen: 200
  # Recall safety slice around the cap cutoff.
  bm25_validation_tail_size: 20
  # Bounded cap safety valve: evaluate one overflow slice when validation-tail yield is high.
  cap_overflow_enabled: true
  cap_overflow_trigger_include_rate: 0.20
  cap_overflow_min_validation_n: 10
  cap_overflow_slice_size: 25
  cap_overflow_max_extra: 50
  # Calibration: one pass on 15 papers is enough to confirm reviewers agree.
  # Re-screening the same sample multiple times (max_iterations > 1) does not
  # meaningfully improve kappa for well-scoped topics and wastes LLM calls.
  calibration_sample_size: 15
  calibration_max_iterations: 1
  # Keep stub threshold at 0 to avoid dropping short but potentially relevant abstracts.
  # Empty-abstract records are handled by deterministic pre-LLM exclusion above.
  insufficient_content_min_words: 0
  # Batch LLM pre-ranker: scores all BM25-selected papers in batches of 80 with a
  # single LLM call each, then only forwards papers scoring >= 0.35 to the dual-reviewer.
  # Reduces dual-review calls by ~60-70% while maintaining recall (threshold is intentionally
  # low -- a false negative here permanently loses a study).
  batch_screen_enabled: true
  batch_screen_size: 80
  batch_screen_threshold: 0.30
  # Forward near-threshold records (threshold-band, threshold) instead of excluding.
  batch_screen_uncertain_band: 0.05
  # Number of batch LLM ranker calls sent concurrently (default 3 balances throughput vs. RPM).
  batch_screen_concurrency: 3
  # Papers per LLM call in the dual-reviewer phase.
  # 0 = per-paper mode (one call per paper). 10 = send 10 papers per batch call.
  # Reduces dual-reviewer LLM calls by ~5x while preserving all decisions and callbacks.
  reviewer_batch_size: 10
  # Recall-first guard: exclude decisions at title/abstract require dual review.
  exclude_fast_path_requires_dual: true

dual_review:
  enabled: true
  kappa_warning_threshold: 0.4
  # reviewer_b_model: overridden via agents.screening_reviewer_b.model above.
  # Reviewer A uses gemini-2.5-flash-lite; Reviewer B uses gemini-2.5-flash
  # for genuine cross-model validation (not just temperature variation).
  # Adjudicator also uses gemini-2.5-flash.

gates:
  profile: "strict"
  search_volume_minimum: 50
  screening_minimum: 5
  extraction_completeness_threshold: 0.8
  extraction_max_empty_rate: 0.35
  cost_budget_max: 30.0

writing:
  humanization: true
  humanization_iterations: 2
  checkpoint_per_section: true
  llm_timeout: 120
  # 3 concurrent sections: abstract/intro/methods kick off together, results/discussion/conclusion next.
  # Pro-tier RPM is typically 10 RPM; 3 concurrent keeps us safely under that at 45-60s per call.
  writing_concurrency: 3

rag:
  embed_model: "google-gla:gemini-embedding-001"
  embed_dim: 768       # MRL output dimension; changing requires wiping paper_chunks_meta and re-embedding
  embed_batch_size: 20
  # Number of embedding API batch calls sent concurrently. Each batch is embed_batch_size texts.
  embed_concurrency: 4
  chunk_max_words: 400
  chunk_overlap_sentences: 2
  use_hyde: true
  hyde_model: "google-gla:gemini-2.5-flash-lite"
  rerank: true
  reranker_model: "google-gla:gemini-2.5-flash-lite"
  candidate_k: 20      # Retrieved per section before reranking
  final_k: 8           # Final context chunks injected into writing prompt
  min_chunks_per_section: 1
  max_empty_sections: 2
  block_writing_on_rag_failure: false

risk_of_bias:
  rct_tool: "rob2"
  non_randomized_tool: "robins_i"
  qualitative_tool: "casp"

meta_analysis:
  enabled: true
  heterogeneity_threshold: 50
  funnel_plot_minimum_studies: 10
  effect_measure_dichotomous: "risk_ratio"
  effect_measure_continuous: "standardized_mean_difference"

ieee_export:
  enabled: true
  template: "IEEEtran"
  bibliography_style: "IEEEtran"
  max_abstract_words: 250
  target_page_range:
    - 7
    - 10

citation_lineage:
  block_export_on_unresolved: true
  minimum_evidence_score: 0.5

web:
  # Run record TTL: evict completed _active_runs entries older than this many seconds.
  run_ttl_seconds: 7200
  # How often (seconds) to check for and evict stale run records.
  eviction_interval_seconds: 1800
  # How often (seconds) the flusher writes buffered SSE events to SQLite.
  event_flush_interval_seconds: 5
  # How often (seconds) the heartbeat updates workflows_registry.
  heartbeat_interval_seconds: 60

# Full-text retrieval and multi-modal extraction settings.
# Tiers: Unpaywall, arXiv, Semantic Scholar, CORE, Europe PMC, ScienceDirect, PMC
# Fallback: abstract text
extraction:
  # Per-tier HTTP timeout (seconds) used inside fetch_full_text().
  # Open-access tiers (Unpaywall, CORE, S2, EuropePMC) are now raced in parallel
  # so each tier has this timeout independently; the race resolves on the first
  # successful result. Reducing from 20 -> 12 is safe: most open-access APIs
  # respond in <5s; slow responses indicate the paper is unavailable on that host.
  pdf_tier_timeout_seconds: 12
  sciencedirect_full_text: true
  unpaywall_full_text: true
  pmc_full_text: true
  core_full_text: true
  europepmc_full_text: true
  semanticscholar_full_text: true
  arxiv_full_text: true
  biorxiv_medrxiv_full_text: true
  openalex_content_full_text: true  # enabled; requires OPENALEX_API_KEY in .env
  crossref_links_full_text: true
  use_pdf_vision: true
  pdf_vision_model: "google-gla:gemini-2.5-flash-lite"
  full_text_min_chars: 500
  # Papers extracted concurrently; each paper's classify+extract+RoB steps run sequentially within it.
  # 4 concurrent with flash_rpm=20 gives safe throughput (each extraction ~20-40s).
  extraction_concurrency: 4

# Search depth: how many records to fetch per database connector.
# max_results_per_db is the global default; per_database_limits overrides
# it for individual connectors.
# Primary peer-reviewed databases only -- Perplexity, Crossref, arXiv removed
# as they are not standard systematic review sources.
search:
  max_results_per_db: 500
  per_database_limits:
    pubmed: 500
    openalex: 1000
    scopus: 500
    semantic_scholar: 500
    ieee_xplore: 200
    # Legacy connectors kept for backward-compat but not in default target_databases:
    crossref: 500
    arxiv: 200
    perplexity_search: 20
  # Emit a WARNING log when a database returns fewer than this many records.
  # Surfaces over-restricted queries early so the user can fix before screening.
  # Set to 0 to disable.
  low_recall_warning_threshold: 10
  # Number of included papers chased concurrently during citation chasing.
  # Each paper triggers parallel Semantic Scholar + OpenAlex HTTP calls.
  citation_chasing_concurrency: 5
