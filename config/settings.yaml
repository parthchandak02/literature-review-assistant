llm:
  # Raised from 10/15/5 after confirming Gemini 3.x preview quotas support higher
  # throughput at Tier 1 paid. Benchmarks (Jeffrey 2024, Batson 2020) ran searches
  # on standard APIs without artificial rate limiting.
  flash_rpm: 20
  flash_lite_rpm: 30
  pro_rpm: 10
  # Per-request HTTP timeout in seconds. Pro-tier writing/quality calls can take
  # 60-120s for large outputs; 504 DEADLINE_EXCEEDED errors indicate this needs raising.
  request_timeout_seconds: 120

agents:
  screening_reviewer_a:
    model: "google-gla:gemini-3.1-flash-lite-preview"
    temperature: 0.1
  screening_reviewer_b:
    model: "google-gla:gemini-3-flash-preview"
    temperature: 0.1
  screening_adjudicator:
    model: "google-gla:gemini-3.1-pro-preview"
    temperature: 0.2
  search:
    model: "google-gla:gemini-3.1-flash-lite-preview"
    temperature: 0.1
  extraction:
    model: "google-gla:gemini-3.1-pro-preview"
    temperature: 0.1
  quality_assessment:
    model: "google-gla:gemini-3.1-pro-preview"
    temperature: 0.2
  study_type_detection:
    model: "google-gla:gemini-3.1-flash-lite-preview"
    temperature: 0.2
  writing:
    model: "google-gla:gemini-3.1-pro-preview"
    temperature: 0.2
  abstract_generation:
    model: "google-gla:gemini-3.1-flash-lite-preview"
    temperature: 0.2
  humanizer:
    model: "google-gla:gemini-3.1-pro-preview"
    temperature: 0.3
  contradiction_resolver:
    model: "google-gla:gemini-3.1-pro-preview"
    temperature: 0.2
  naturalness_scorer:
    model: "google-gla:gemini-3.1-flash-lite-preview"
    temperature: 0.1
  criteria_refinement:
    model: "google-gla:gemini-3.1-pro-preview"
    temperature: 0.2
  table_extraction:
    model: "google-gla:gemini-3.1-flash-lite-preview"
    temperature: 0.1
  config_generation:
    model: "google-gla:gemini-3.1-flash-lite-preview"
    temperature: 0.3
  concept_diagrams:
    model: "google-gla:gemini-3.1-flash-lite-preview"
    temperature: 0.3
  narrative:
    model: "google-gla:gemini-3.1-flash-lite-preview"
    temperature: 0.2
  style_extraction:
    model: "google-gla:gemini-3.1-pro-preview"
    temperature: 0.2

screening:
  stage1_include_threshold: 0.85
  stage1_exclude_threshold: 0.8
  keyword_filter_min_matches: 1
  # true: papers without retrievable full text are auto-excluded at the full-text
  # screening stage with ExclusionReason.NO_FULL_TEXT. PRISMA 2020 item 17 requires
  # a "Reports not retrieved" box; without this gate that count is always 0 and
  # papers screened on abstract alone are incorrectly included in synthesis.
  # Note: this may exclude paywalled papers with no open-access PDF; those papers
  # should appear in the PRISMA flow as "not retrieved" rather than as included studies.
  skip_fulltext_if_no_pdf: true
  screening_concurrency: 5
  # Raised from 200 -> 400. With 5+ databases on a broad topic, the dedup pool can
  # reach 800-2000 records; 200 was silently dropping relevant papers past the BM25 cutoff.
  max_llm_screen: 400
  # Calibration: one pass on 15 papers is enough to confirm reviewers agree.
  # Re-screening the same sample multiple times (max_iterations > 1) does not
  # meaningfully improve kappa for well-scoped topics and wastes LLM calls.
  calibration_sample_size: 15
  calibration_max_iterations: 1
  # Lowered from 12 -> 5 -> 0. At 12, 322/368 papers were auto-excluded before LLM because
  # databases return many records with short or absent abstracts. At 0, stub-abstract records
  # reach the LLM dual-screener, which can exclude them on title alone. Papers with no abstract
  # at all (empty string) still auto-exclude via the `not abstract` check in _is_insufficient_content.
  # This allows papers with no abstract to reach the LLM screener, which can exclude
  # them on title alone rather than the heuristic stub-abstract filter.
  insufficient_content_min_words: 0

dual_review:
  enabled: true
  kappa_warning_threshold: 0.4
  # reviewer_b_model: overridden via agents.screening_reviewer_b.model above.
  # Reviewer A uses gemini-3.1-flash-lite-preview; Reviewer B uses gemini-3-flash-preview
  # for genuine cross-model validation (not just temperature variation).

gates:
  profile: "warning"
  search_volume_minimum: 50
  screening_minimum: 5
  extraction_completeness_threshold: 0.8
  extraction_max_empty_rate: 0.35
  cost_budget_max: 30.0

writing:
  style_extraction: true
  humanization: true
  humanization_iterations: 2
  naturalness_threshold: 0.75
  checkpoint_per_section: true
  llm_timeout: 120

rag:
  embed_model: "google-gla:gemini-embedding-001"
  embed_dim: 768       # MRL output dimension; changing requires wiping paper_chunks_meta and re-embedding
  embed_batch_size: 20
  chunk_max_words: 400
  chunk_overlap_sentences: 2
  use_hyde: true
  hyde_model: "google-gla:gemini-3.1-flash-lite-preview"
  rerank: true
  reranker_model: "google-gla:gemini-3.1-flash-lite-preview"

risk_of_bias:
  rct_tool: "rob2"
  non_randomized_tool: "robins_i"
  qualitative_tool: "casp"

meta_analysis:
  enabled: true
  heterogeneity_threshold: 50
  funnel_plot_minimum_studies: 10
  effect_measure_dichotomous: "risk_ratio"
  effect_measure_continuous: "standardized_mean_difference"

ieee_export:
  enabled: true
  template: "IEEEtran"
  bibliography_style: "IEEEtran"
  max_abstract_words: 250
  target_page_range:
    - 7
    - 10

citation_lineage:
  block_export_on_unresolved: true
  minimum_evidence_score: 0.5

web:
  # Run record TTL: evict completed _active_runs entries older than this many seconds.
  run_ttl_seconds: 7200
  # How often (seconds) to check for and evict stale run records.
  eviction_interval_seconds: 1800
  # How often (seconds) the flusher writes buffered SSE events to SQLite.
  event_flush_interval_seconds: 5
  # How often (seconds) the heartbeat updates workflows_registry.
  heartbeat_interval_seconds: 60

# Full-text retrieval and multi-modal extraction settings.
# Tiers: Unpaywall, arXiv, Semantic Scholar, CORE, Europe PMC, ScienceDirect, PMC
# Fallback: abstract text
extraction:
  sciencedirect_full_text: true
  unpaywall_full_text: true
  pmc_full_text: true
  core_full_text: true
  europepmc_full_text: true
  semanticscholar_full_text: true
  arxiv_full_text: true
  biorxiv_medrxiv_full_text: true
  openalex_content_full_text: false  # opt-in; $0.01/file
  crossref_links_full_text: true
  use_pdf_vision: true
  pdf_vision_model: "google-gla:gemini-3.1-flash-lite-preview"
  full_text_min_chars: 500

# Search depth: how many records to fetch per database connector.
# max_results_per_db is the global default; per_database_limits overrides
# it for individual connectors.
# Primary peer-reviewed databases only -- Perplexity, Crossref, arXiv removed
# as they are not standard systematic review sources.
search:
  max_results_per_db: 500
  per_database_limits:
    pubmed: 500
    openalex: 1000
    scopus: 500
    semantic_scholar: 500
    ieee_xplore: 200
    # Legacy connectors kept for backward-compat but not in default target_databases:
    crossref: 500
    arxiv: 200
    perplexity_search: 20
  # Emit a WARNING log when a database returns fewer than this many records.
  # Surfaces over-restricted queries early so the user can fix before screening.
  # Set to 0 to disable.
  low_recall_warning_threshold: 10
