# Config generation mode: web-grounded brief with live web research.
# Review and edit this YAML before launching the workflow.

research_question: "What is the effectiveness of gamification in improving student engagement and learning outcomes in higher education STEM courses?"
review_type: "systematic"

# Living review settings (optional)
# Set living_review: true to enable incremental updates.
# last_search_date is updated automatically after each run.
living_review: false
last_search_date: null

pico:
  population: "Individuals and households"
  intervention: "AI-powered household robots designed for domestic chores"
  comparison: "Pre-robotization of domestic chores or manual performance of chores"
  outcome: "Human individual health (physical and cognitive), time spent on chores, physical strain, user satisfaction, and task completion efficiency"

keywords:
  - "AI robotics"
  - "artificial intelligence robotics"
  - "household robots"
  - "domestic robots"
  - "service robots"
  - "intelligent home robots"
  - "cobots home"
  - "human-robot interaction"
  - "HRI domestic"
  - "smart home robots"
  - "assistive robotics"
  - "automation domestic labor"
  - "iRobot"
  - "Roomba"
  - "Amazon Astro"
  - "Samsung Bot Handy"
  - "LG CLOi"
  - "elderly assistance"
  - "disability support"
  - "task completion rate"
  - "time saved"
  - "physical strain reduction"
  - "user satisfaction"
  - "fall prevention"

domain: "AI and Robotics in Domestic Settings"
scope: "This systematic review will examine the impact of artificial intelligence (AI)-powered robots designed to perform daily household chores. It will focus on populations within general households, including elderly individuals and those with disabilities, and assess outcomes related to human individual health, including physical and cognitive aspects, as well as measures of task efficiency and user satisfaction. The review will consider robots that assist with or automate domestic labor, comparing their effects to scenarios without such automation or with manual chore performance."

domain_expert:
  expert_role: "Robotics Engineer specializing in Human-Robot Interaction"
  domain_summary: "The field of AI-powered household robotics is rapidly evolving, moving beyond simple automation to intelligent task execution and human collaboration within the home environment. Key challenges include robust navigation, object manipulation, and ensuring user acceptance and safety. The impact on human well-being, particularly for vulnerable populations, is a critical area of research."
  canonical_terms:
    - "AI household robots"
    - "domestic service robots"
    - "human-robot interaction"
    - "assistive robotics"
    - "automation of domestic work"
  related_terms:
    - "smart home technology"
    - "cobots"
    - "ubiquitous computing"
    - "personal robots"
  excluded_terms:
    - "industrial robots"
    - "autonomous vehicles"
    - "drones"
    - "telepresence robots"
    - "surgical robots"
  methodological_focus:
    - "human-robot interaction studies"
    - "usability testing"
    - "longitudinal impact studies"
    - "field trials"
  outcome_focus:
    - "human health metrics"
    - "task efficiency"
    - "user experience"
    - "adoption and acceptance"

inclusion_criteria:
  - "Studies must evaluate artificial intelligence (AI)-powered robots designed for performing domestic household chores."
  - "The study population must include individuals or households, with specific attention to elderly populations or individuals with disabilities where applicable."
  - "Outcomes must report on human individual health (physical or cognitive), time savings, physical strain, user satisfaction, or task completion efficiency related to robot use."
  - "Studies must compare the use of AI-powered household robots against a baseline of manual chore performance or no automation."
  - "Research must be published in English."
  - "Included study designs are empirical research, including experimental, quasi-experimental, observational studies, and field trials."
  - "Publications must be peer-reviewed journal articles or conference proceedings."

exclusion_criteria:
  - "Studies focusing solely on industrial robots, manufacturing automation, or non-domestic service robots."
  - "Research on autonomous vehicles, drones, or other aerial robotics not intended for indoor household tasks."
  - "Studies exclusively examining smart home hubs, voice assistants, or software-based home automation without physical robotic embodiment."
  - "Research focusing on telepresence robots or robots designed primarily for remote communication."
  - "Studies on surgical robots or highly specialized medical robotics."
  - "Publications not available in English."
  - "Literature reviews, opinion pieces, editorials, and theoretical papers without empirical data."

date_range_start: 2000
date_range_end: 2026

target_databases:
  - openalex
  - pubmed
  - semantic_scholar
  - crossref
  - arxiv
  - dblp
  - europepmc
  - core
  - scopus
  - web_of_science
  - ieee_xplore

target_sections:
  - abstract
  - introduction
  - methods
  - results
  - discussion
  - conclusion

protocol:
  registered: false
  registry: "PROSPERO"
  registration_number: ""
  url: ""

funding:
  source: "No funding received"
  grant_number: ""
  funder: ""

conflicts_of_interest: "The authors declare no conflicts of interest."

# Optional: override auto-generated queries per database. Omit a database to use default.
search_overrides:
  pubmed: "((\"Robotics\"[MeSH Terms] OR \"Artificial Intelligence\"[MeSH Terms]) AND \"Household\"[MeSH Terms]) OR (\"household robot\"[Title/Abstract] OR \"domestic robot\"[Title/Abstract] OR \"AI robot\"[Title/Abstract] OR \"service robot\"[Title/Abstract] OR \"assistive robot\"[Title/Abstract] OR \"cobot\"[Title/Abstract]) AND (\"health\"[Title/Abstract] OR \"wellbeing\"[Title/Abstract] OR \"strain\"[Title/Abstract] OR \"satisfaction\"[Title/Abstract] OR \"efficiency\"[Title/Abstract] OR \"time\"[Title/Abstract] OR \"elderly\"[Title/Abstract] OR \"disability\"[Title/Abstract])"
  scopus: "TITLE-ABS-KEY(\"AI robot\" OR \"artificial intelligence robot\" OR \"household robot\" OR \"domestic robot\" OR \"service robot\" OR \"assistive robot\" OR \"cobot\") AND TITLE-ABS-KEY(\"human health\" OR \"physical health\" OR \"cognitive health\" OR \"physical strain\" OR \"user satisfaction\" OR \"task completion\" OR \"time saving\" OR \"domestic labor\" OR \"elderly\" OR \"disability\") AND PUBYEAR > 2009 AND PUBYEAR < 2027"
  web_of_science: "(TS=\"AI robot\" OR TS=\"artificial intelligence robot\" OR TS=\"household robot\" OR TS=\"domestic robot\" OR TS=\"service robot\" OR TS=\"assistive robot\" OR TS=\"cobot\") AND (TS=\"human health\" OR TS=\"physical health\" OR TS=\"cognitive health\" OR TS=\"physical strain\" OR TS=\"user satisfaction\" OR TS=\"task completion\" OR TS=\"time saving\" OR TS=\"domestic labor\" OR TS=\"elderly\" OR TS=\"disability\") AND PY=2010-2026"
  ieee_xplore: "(\"AI robot\" OR \"artificial intelligence robot\" OR \"household robot\" OR \"domestic robot\" OR \"service robot\" OR \"assistive robot\" OR \"cobot\") AND (\"human health\" OR \"physical health\" OR \"cognitive health\" OR \"physical strain\" OR \"user satisfaction\" OR \"task completion\" OR \"time saving\" OR \"domestic labor\" OR \"elderly\" OR \"disability\")"
  semantic_scholar: "AI household robot human health domestic labor user satisfaction elderly disability"
  openalex: "AI household robot human health domestic labor user satisfaction elderly disability"
  core: "AI household robot human health domestic labor user satisfaction elderly disability"
