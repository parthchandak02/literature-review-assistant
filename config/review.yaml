research_question: "What is the impact of user experience (UX) evaluation and hardware-software prototyping on the usability, feasibility, and adoption of medical devices designed for low-income populations and DIY healthcare?"
review_type: "systematic"

# Living review settings (optional)
# Set living_review: true to enable incremental updates.
# last_search_date is updated automatically after each run.
living_review: false
last_search_date: null

pico:
  population: "Low-income populations, underserved communities, resource-limited settings, low- and middle-income countries (LMICs), community health workers, lay healthcare providers, DIY patients, and caregivers using or developing medical devices"
  intervention: "User experience (UX) evaluation methods (usability testing, human factors engineering, user-centered design) combined with hardware-software prototyping (rapid prototyping, iterative design-build-test cycles, embedded systems prototyping, low-fidelity and high-fidelity prototyping) applied to medical device creation"
  comparison: "Alternative design approaches without systematic UX evaluation, non-iterative prototyping methods, commercial off-the-shelf certified devices, or pre-implementation baseline states"
  outcome: "Usability metrics (System Usability Scale, task completion rate, error rate, time-on-task, learnability), user acceptance (Technology Acceptance Model, behavioral intention, perceived usefulness, perceived ease of use), prototyping process metrics (number of iterations, time from concept to prototype, component cost reduction, fidelity level), adoption and feasibility (usage frequency, dropout rate, device failure rate, repair rate), cost metrics (cost per device, cost per test, total cost of ownership), and health outcome metrics (time to diagnosis, diagnostic accuracy, referral completion rate)"

