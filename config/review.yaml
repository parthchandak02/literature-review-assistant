# ============================================================
# review.yaml -- Per-review configuration template
# Replace ALL placeholder values below with your review topic.
# This file is the single source of truth for your research
# question, PICO, keywords, and search strategy.
# ============================================================

research_question: "What is the effect of [INTERVENTION] on [OUTCOME] in [POPULATION]?"
review_type: "systematic"

# Living review settings (optional)
# Set living_review: true to enable incremental updates.
# last_search_date is updated automatically after each run.
living_review: false
last_search_date: null

pico:
  population: "Describe the target population (e.g., adults with condition X, students in setting Y)."
  intervention: "Describe the intervention or exposure (e.g., technology Z, treatment A)."
  comparison: "Describe the comparator (e.g., standard care, placebo, pre-intervention baseline)."
  outcome: "Describe the primary and secondary outcomes (e.g., clinical measure, quality of life, cost)."

keywords:
  - "primary intervention keyword"
  - "broad synonym for intervention"
  - "device or platform synonym"
  - "population synonym (e.g., older adult, elderly)"
  - "outcome synonym (e.g., adherence, compliance, persistence)"
  - "setting synonym (e.g., community, long-term care)"

domain: "Briefly describe the subject domain (e.g., public health, engineering, education)."
scope: "Describe the scope of this review in 2-3 sentences: what is included, what is excluded, and why."

inclusion_criteria:
  - "Studies must evaluate [INTERVENTION] in [POPULATION]; include studies where intervention wording is conceptually aligned even if terminology differs."
  - "Studies must report [OUTCOME MEASURE]."
  - "Peer-reviewed journal articles and conference proceedings are eligible."
  - "Studies must be published in the English language."

exclusion_criteria:
  - "Studies that clearly do not evaluate [INTERVENTION] are excluded."
  - "Editorials, opinion pieces, and non-empirical literature are excluded."
  - "Studies not reporting [OUTCOME MEASURE] are excluded."

date_range_start: 2000
date_range_end: 2026

target_databases:
  - openalex
  - pubmed
  - semantic_scholar
  - scopus
  - ieee_xplore
  - clinicaltrials_gov

target_sections:
  - abstract
  - introduction
  - methods
  - results
  - discussion
  - conclusion

protocol:
  registered: false
  registry: "PROSPERO"
  registration_number: ""
  url: ""

funding:
  source: "No funding received"
  grant_number: ""
  funder: ""

conflicts_of_interest: "The authors declare no conflicts of interest."
author_name: ""  # Fill in: full name of the corresponding/first author (used in CRediT and LaTeX \author{})

# Optional: override auto-generated queries per database.
# Omit a database to use the auto-generated boolean query.
# search_overrides:
#   pubmed: "(MeSH Term[MeSH Terms] OR \"keyword\"[Title/Abstract]) AND (\"intervention\"[Title/Abstract])"
#   scopus: "TITLE-ABS-KEY(\"keyword\" OR \"synonym\") AND TITLE-ABS-KEY(\"outcome\")"
#   ieee_xplore: "(\"keyword\") AND (\"application domain\")"
#   semantic_scholar: "keyword intervention outcome population"
#   openalex: "keyword intervention outcome effectiveness"
#   clinicaltrials_gov: "\"keyword\" OR \"intervention\" OR \"outcome\""
