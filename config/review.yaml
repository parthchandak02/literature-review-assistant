research_question: "What is the impact of robotic medication dispensing systems on dispensing accuracy, medication error rates, operational efficiency, and patient safety in outpatient, ambulatory, community, university, or college pharmacy settings, and what are the implementation barriers and facilitators?"
review_type: "systematic"

# Living review settings (optional)
# Set living_review: true to enable incremental updates.
# last_search_date is updated automatically after each run.
# When enabled, connectors only fetch records published after last_search_date,
# and previously screened DOIs are skipped automatically.
living_review: false
last_search_date: null

pico:
  population: "Pharmacists, pharmacy technicians, and patients served by outpatient, ambulatory, community, university, or college health center pharmacies"
  intervention: "Robotic or automated medication dispensing systems, including robotic prescription filling systems and automated dispensing cabinets (ADCs)"
  comparison: "Manual or traditional pharmacy dispensing workflows, human-operated dispensing processes, or pre-implementation baselines"
  outcome: "Dispensing accuracy, medication error rates, operational efficiency, prescription turnaround time, cost-effectiveness, staff workload and satisfaction, and patient safety outcomes"

keywords:
  - "robotic dispensing"
  - "automated dispensing"
  - "pharmacy automation"
  - "medication dispensing robot"
  - "automated dispensing cabinet"
  - "robotic pharmacy"
  - "automated pharmacy system"
  - "prescription dispensing automation"
  - "pharmacy robotics"
  - "dispensing accuracy"
  - "medication error"
  - "university health center"
  - "college health"
  - "campus pharmacy"
  - "ambulatory pharmacy"
  - "outpatient pharmacy"
  - "community pharmacy"
  - "ScriptPro"
  - "Pyxis"
  - "Omnicell"
  - "patient safety"
  - "pharmacy workflow"

domain: "Pharmacy automation and robotic dispensing in outpatient and ambulatory pharmacy settings"
scope: "Focus on robotic and automated medication dispensing systems deployed in outpatient, ambulatory, community, university, and college health pharmacy settings. Includes automated dispensing cabinets (e.g., Pyxis, Omnicell) and modern robotic prescription filling systems (e.g., ScriptPro, RxMedic, Parata). Covers outcomes related to dispensing accuracy, medication errors, efficiency, cost, and staff and patient experience, including implementation barriers and facilitators."

inclusion_criteria:
  - "Studies evaluating robotic or automated medication dispensing systems in outpatient, ambulatory, community, university, or college pharmacy settings"
  - "Studies comparing automated dispensing to manual dispensing or reporting outcomes after implementation of automated systems"
  - "Studies reporting dispensing accuracy, medication error rates, turnaround time, operational efficiency, or cost outcomes"
  - "Studies reporting staff satisfaction, workload, or implementation experience with pharmacy automation"
  - "Studies reporting patient safety outcomes related to automated dispensing"
  - "Published in English and peer-reviewed"
  - "Implementation reports, quality improvement studies, or controlled trials with empirical outcome data"

exclusion_criteria:
  - "Studies exclusively focused on inpatient hospital ward dispensing with no outpatient or ambulatory applicability"
  - "Studies on medication administration devices (e.g., infusion pumps, insulin pens) not involving dispensing workflow automation"
  - "Studies without empirical outcome data (e.g., opinion pieces, editorials, purely descriptive technology overviews)"
  - "Non-peer-reviewed sources, conference-only abstracts lacking a full-length peer-reviewed paper"
  - "Studies on inventory management or procurement systems without a dispensing accuracy or patient safety outcome"
  - "Non-English publications"

date_range_start: 2010
date_range_end: 2026

target_databases:
  - scopus
  - web_of_science
  - openalex
  - pubmed
  - semantic_scholar
  # Additional connectors (opt-in):
  # - ieee_xplore
  # - clinicaltrials_gov

target_sections:
  - abstract
  - introduction
  - methods
  - results
  - discussion
  - conclusion

protocol:
  registered: false
  registry: "PROSPERO"
  registration_number: ""
  url: ""

funding:
  source: "No funding received"
  grant_number: ""
  funder: ""

conflicts_of_interest: "The authors declare no conflicts of interest."

# Optional: override auto-generated queries per database. Omit a database to use default.
search_overrides:
  scopus: >-
    TITLE-ABS-KEY("robotic dispensing" OR "automated dispensing" OR "pharmacy automation"
    OR "automated dispensing cabinet" OR "robotic pharmacy" OR "ScriptPro" OR "Pyxis" OR "Omnicell")
    AND TITLE-ABS-KEY("dispensing accuracy" OR "medication error" OR "patient safety"
    OR "outpatient pharmacy" OR "ambulatory pharmacy" OR "community pharmacy" OR "pharmacy workflow")
    AND PUBYEAR > 2009 AND PUBYEAR < 2027
  web_of_science: >-
    (TS="robotic dispensing" OR TS="automated dispensing" OR TS="pharmacy automation"
    OR TS="automated dispensing cabinet" OR TS="robotic pharmacy" OR TS="ScriptPro"
    OR TS="Pyxis" OR TS="Omnicell")
    AND (TS="dispensing accuracy" OR TS="medication error" OR TS="patient safety"
    OR TS="outpatient pharmacy" OR TS="ambulatory pharmacy" OR TS="community pharmacy")
    AND PY=2010-2026
  pubmed: >-
    ("Automation"[MeSH Terms] OR "Robotics"[MeSH Terms]
    OR "robotic dispensing"[Title/Abstract] OR "automated dispensing"[Title/Abstract]
    OR "pharmacy automation"[Title/Abstract] OR "automated dispensing cabinet"[Title/Abstract]
    OR "robotic pharmacy"[Title/Abstract] OR "ScriptPro"[Title/Abstract]
    OR "Pyxis"[Title/Abstract] OR "Omnicell"[Title/Abstract] OR "RxMedic"[Title/Abstract])
    AND
    ("Medication Errors"[MeSH Terms] OR "Pharmacy Service, Hospital"[MeSH Terms]
    OR "dispensing accuracy"[Title/Abstract] OR "medication error*"[Title/Abstract]
    OR "outpatient pharmacy"[Title/Abstract] OR "ambulatory pharmacy"[Title/Abstract]
    OR "community pharmacy"[Title/Abstract] OR "pharmacy workflow"[Title/Abstract]
    OR "patient safety"[Title/Abstract])
  semantic_scholar: "robotic dispensing pharmacy automation medication error dispensing accuracy outpatient ambulatory"
  openalex: "robotic dispensing pharmacy automation medication error dispensing accuracy outpatient ambulatory"
