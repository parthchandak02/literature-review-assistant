inclusion_criteria:
  - "Studies that evaluate user experience (UX), usability, or human factors of a medical device developed through prototyping or iterative design processes."
  - "Studies where the medical device is intended for use in low-income populations, resource-limited settings, low- and middle-income countries (LMICs), or DIY healthcare contexts."
  - "Studies that report at least one measurable outcome related to usability (e.g., SUS score, task completion rate, error rate, time-on-task), user acceptance (e.g., TAM scales, behavioral intention), prototyping process (e.g., number of iterations, time to prototype, cost reduction), or feasibility/adoption (e.g., usage frequency, dropout rate, device failure rate)."
  - "Peer-reviewed journal articles, conference proceedings, or preprints published in English."
  - "Studies involving any type of prototyping approach including low-fidelity, high-fidelity, functional, or iterative hardware-software prototyping."
  - "Studies involving any user population including community health workers, lay healthcare providers, patients, caregivers, or healthcare professionals using the device in low-resource settings."

exclusion_criteria:
  - "Studies focused exclusively on telemedicine, telehealth, or remote consultation platforms without a physical device prototyping component."
  - "Studies of software-only mobile health (mHealth) applications that do not involve sensor-based hardware prototyping or hardware-software co-design."
  - "Studies of commercial certified point-of-care diagnostics (e.g., Abbott i-STAT, Cepheid GeneXpert) used as final products without iterative prototyping or UX evaluation."
  - "Studies of AI/ML diagnostic models deployed on existing hardware (e.g., tablets, smartphones) without custom hardware prototyping or hardware-software integration."
  - "Studies of medical devices designed exclusively for high-income hospital settings without application to low-income populations or resource-limited settings."
  - "Studies of 3D printing used solely as a final manufacturing method without iterative prototyping cycles or user feedback evaluation."
  - "Studies of assistive technology for disabilities that do not explicitly target low-income populations or resource-limited settings."
  - "Opinion pieces, editorials, reviews, or study protocols without original empirical data."

