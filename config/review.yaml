# Optional: override auto-generated queries per database. Omit a database to use default.
search_overrides:
  pubmed: "(Artificial Intelligence[MeSH Terms] OR \"conversational AI\"[Title/Abstract] OR \"generative AI\"[Title/Abstract] OR \"large language model\"[Title/Abstract]) AND (student[Title/Abstract] OR education[Title/Abstract] OR clinical[Title/Abstract] OR diagnostic[Title/Abstract] OR tutoring[Title/Abstract])"
  scopus: "TITLE-ABS-KEY(\"conversational AI\" OR \"generative AI\" OR \"large language model\" OR \"chatbot\" OR \"virtual patient\") AND TITLE-ABS-KEY(\"medical education\" OR \"nursing education\" OR \"clinical reasoning\" OR \"OSCE\" OR \"tutoring\") AND PUBYEAR > 2019 AND PUBYEAR < 2027"
  ieee_xplore: "(\"conversational AI\" OR \"generative AI\" OR \"large language model\" OR \"intelligent tutoring system\") AND (\"medical education\" OR \"clinical training\" OR \"health science\")"
  semantic_scholar: "generative AI medical education student learning outcomes implementation"
  openalex: "conversational AI health science education student learning outcomes effectiveness"
  clinicaltrials_gov: "\"conversational AI\" OR \"generative AI\" OR \"large language model\" OR \"chatbot\" OR \"virtual patient\" OR \"medical education\" OR \"clinical training\""
