# Config generation mode: web-grounded brief with live web research.
# Review and edit this YAML before launching the workflow.

research_question: "What is the effect of spaced repetition flashcard applications on exam performance in undergraduate students?"
review_type: "systematic"

# Living review settings (optional)
# Set living_review: true to enable incremental updates.
# last_search_date is updated automatically after each run.
living_review: false
last_search_date: null

pico:
  population: "Undergraduate university students enrolled in degree-granting programs across disciplines (e.g., psychology, biology, pre-med, engineering, nursing, language learning, business, law)"
  intervention: "Spaced repetition flashcard applications (digital flashcard tools that use algorithmic spacing of retrieval practice, including Anki, Quizlet Learn mode, Memrise, SuperMemo, RemNote, Brainscape, and similar SRS-based apps)"
  comparison: "Paper flashcards, non-adaptive digital flashcards, no-intervention control, alternative study methods (e.g., re-reading, note review), or within-subject comparison across course modules"
  outcome: "Exam scores (mean percentage correct, raw grades, pass/fail rates), retention over time (immediate and delayed recall at intervals from days to months), learning efficiency (time spent studying, cards reviewed), adherence metrics (session frequency, completion rates), and self-reported measures (perceived usefulness, satisfaction, usability)"

keywords:
  - "spaced repetition"
  - "spaced retrieval"
  - "expanded retrieval"
  - "graduated-interval recall"
  - "spaced rehearsal"
  - "SRS app"
  - "digital flashcards"
  - "electronic flashcards"
  - "mobile flashcards"
  - "computer-based flashcards"
  - "flashcard app"
  - "Anki"
  - "Quizlet"
  - "SuperMemo"
  - "Memrise"
  - "retrieval practice"
  - "testing effect"
  - "spacing effect"
  - "distributed practice"
  - "undergraduate"
  - "university students"
  - "exam performance"
  - "exam scores"
  - "academic performance"

domain: "Educational technology and cognitive psychology — spaced repetition flashcard applications in undergraduate higher education"
scope: "This systematic review examines the effect of spaced repetition flashcard applications on exam performance in undergraduate students. It covers studies conducted in university settings across disciplines including STEM, health sciences, social sciences, and humanities. The review includes experimental, quasi-experimental, and observational studies that compare spaced repetition flashcard apps against paper flashcards, non-adaptive digital flashcards, alternative study methods, or no-intervention controls. Outcomes of interest include exam scores, retention over varying intervals, learning efficiency, adherence, and self-reported perceptions."

domain_expert:
  expert_role: "Systematic review expert for Educational technology and cognitive psychology — spaced repetition flashcard applications in undergraduate higher education"
  domain_summary: "This systematic review examines the effect of spaced repetition flashcard applications on exam performance in undergraduate students. It covers studies conducted in university settings across disciplines including STEM, health sciences, social sciences, and humanities. The review includes experimental, quasi-experimental, and observational studies that compare spaced repetition flashcard apps against paper flashcards, non-adaptive digital flashcards, alternative study methods, or no-intervention controls. Outcomes of interest include exam scores, retention over varying intervals, learning efficiency, adherence, and self-reported perceptions."
  canonical_terms:
    - "spaced repetition"
    - "spaced retrieval"
    - "expanded retrieval"
    - "graduated-interval recall"
    - "spaced rehearsal"
    - "SRS app"
    - "digital flashcards"
    - "electronic flashcards"
  related_terms:
    - "mobile flashcards"
    - "computer-based flashcards"
    - "flashcard app"
    - "Anki"
    - "Quizlet"
    - "SuperMemo"
  excluded_terms: []
  methodological_focus: []
  outcome_focus:
    - "Exam scores (mean percentage correct, raw grades, pass/fail rates), retention over time (immediate and delayed recall at intervals from days to months), learning efficiency (time spent studying, cards reviewed), adherence metrics (session frequency, completion rates), and self-reported measures (perceived usefulness, satisfaction, usability)"

inclusion_criteria:
  - "Studies that evaluate a digital flashcard application that uses algorithmic spaced repetition (e.g., Anki, SuperMemo, Memrise, Quizlet Learn mode, Brainscape, RemNote, or similar SRS-based tools)"
  - "Studies where the participant population consists of undergraduate university students enrolled in a degree-granting program"
  - "Studies that report at least one quantitative outcome related to exam performance, test scores, or knowledge retention"
  - "Studies that include a comparison condition such as paper flashcards, non-adaptive digital flashcards, alternative study methods, or no-intervention control"
  - "Peer-reviewed journal articles, conference papers, or preprints published in English"
  - "Studies published from 2005 onward (reflecting the emergence of modern SRS flashcard apps)"
  - "Experimental, quasi-experimental, within-subject, or observational study designs that provide quantitative effect estimates"

exclusion_criteria:
  - "Studies focused on adaptive learning platforms (e.g., ALEKS, Knewton, DreamBox) or intelligent tutoring systems that do not primarily use spaced repetition flashcard mechanics"
  - "Studies evaluating non-adaptive digital flashcards (static digital decks without algorithmic spacing) as the primary intervention"
  - "Studies where the intervention is a multimodal microlearning platform (e.g., Duolingo, Busuu) not primarily structured as a flashcard app"
  - "Studies focused on cognitive training games (e.g., Lumosity, Brain Age) targeting working memory or processing speed rather than course content"
  - "Studies involving only paper flashcards as the intervention (not the comparator)"
  - "Studies conducted exclusively with graduate students, medical residents, or K-12 populations without an undergraduate student subsample"
  - "Opinion pieces, editorials, book chapters, or studies that do not report original empirical data"

date_range_start: 2000
date_range_end: 2026

