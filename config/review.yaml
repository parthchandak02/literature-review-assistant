# Config generation mode: web-grounded brief with live web research.
# Review and edit this YAML before launching the workflow.

research_question: "What is the impact of artificial intelligence and machine learning technologies on the quality of care and operational efficiency in residential care settings for older adults?"
review_type: "systematic"

# Living review settings (optional)
# Set living_review: true to enable incremental updates.
# last_search_date is updated automatically after each run.
living_review: false
last_search_date: null

pico:
  population: "Older adults residing in residential care settings (e.g., nursing homes, assisted living facilities)"
  intervention: "Artificial intelligence (AI) and machine learning (ML) technologies, including predictive analytics, clinical decision support systems, NLP, computer vision, and AI-powered geriatric care platforms"
  comparison: "Standard care practices without AI/ML integration, or pre-implementation baseline measurements"
  outcome: "Measures of quality of care (e.g., fall detection accuracy, reduction in fall incidence, medication adherence, vital sign stability, early detection of health deterioration, quality of life scores) and operational efficiency (e.g., reduction in hospital readmission rates, length of stay, staff efficiency, workflow optimization, adoption rates)"

keywords:
  - "artificial intelligence"
  - "AI"
  - "machine learning"
  - "ML"
  - "deep learning"
  - "clinical decision support"
  - "predictive analytics"
  - "natural language processing"
  - "NLP"
  - "computer vision"
  - "geriatric care"
  - "elder care"
  - "senior care"
  - "long-term care"
  - "nursing homes"
  - "assisted living"
  - "residential care"
  - "skilled nursing facilities"
  - "SNF"
  - "AgeTech"
  - "fall detection"
  - "fall prevention"
  - "medication adherence"
  - "hospital readmission"

domain: "Artificial Intelligence applications in geriatric residential care settings."
scope: "This systematic review will examine the effects of artificial intelligence (AI) and machine learning (ML) technologies on the quality of care and operational efficiency within residential care settings for older adults. It will focus on interventions such as AI-powered clinical decision support, predictive analytics for health risks, and monitoring systems. The review will consider outcomes including fall detection, health deterioration prediction, medication adherence, hospital readmissions, and staff workflow efficiency, comparing AI-integrated approaches to standard care practices."

domain_expert:
  expert_role: "Geriatric Care Technology Researcher"
  domain_summary: "Expertise in the application of digital health technologies, including AI and ML, to improve care delivery and resident well-being in long-term care facilities for the elderly."
  canonical_terms:
    - "AI in elder care"
    - "ML for geriatrics"
    - "digital health for seniors"
    - "smart senior living"
  related_terms:
    - "ambient assisted living"
    - "remote patient monitoring"
    - "wearable sensors"
    - "health informatics"
  excluded_terms:
    - "AI in acute care hospitals"
    - "AI in pediatrics"
    - "consumer fitness trackers"
    - "basic telehealth"
  methodological_focus:
    - "effectiveness studies"
    - "implementation science"
    - "comparative effectiveness"
  outcome_focus:
    - "patient safety"
    - "care quality"
    - "operational efficiency"
    - "resident well-being"

inclusion_criteria:
  - "Studies evaluating the use of artificial intelligence (AI) or machine learning (ML) technologies in residential care settings for older adults."
  - "Studies must report on at least one measurable outcome related to quality of care or operational efficiency."
  - "Interventions must involve AI/ML components such as predictive analytics, decision support, or automated monitoring."
  - "The primary population studied must be older adults residing in nursing homes, assisted living facilities, or similar long-term care environments."
  - "Studies must include a comparison group (e.g., standard care, pre-intervention baseline) or provide quantitative data allowing for such comparison."
  - "Publications must be peer-reviewed journal articles or conference proceedings."
  - "Studies must be published in English."

exclusion_criteria:
  - "Studies focusing solely on AI applications in acute hospital settings, community health, or primary care without a residential care component."
  - "Studies that use technologies without significant AI/ML components, such as basic sensor networks, non-AI-enabled telehealth, or simple communication platforms."
  - "Studies where the primary population is not older adults."
  - "Studies that do not report specific, measurable outcomes related to care quality or operational efficiency."
  - "Studies focusing exclusively on the technical development of AI algorithms without evaluating their impact in a care setting."
  - "Opinion pieces, editorials, reviews, or theoretical papers without empirical data."
  - "Studies published in languages other than English."

date_range_start: 2000
date_range_end: 2026

