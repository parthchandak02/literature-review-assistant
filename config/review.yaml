domain: "User experience evaluation and hardware-software prototyping for medical devices in low-resource and DIY healthcare settings"
scope: "This systematic review covers studies that evaluate user experience (UX) methods and hardware-software prototyping approaches used in the development of medical devices for low-income populations and DIY healthcare. The review includes devices developed for community health workers, lay providers, and patients in resource-limited settings such as rural clinics, health posts, and household environments. It examines outcomes related to usability, user acceptance, prototyping process efficiency, cost, feasibility, and adoption. The review excludes telemedicine platforms, software-only mobile health apps, commercial certified point-of-care diagnostics used without prototyping, and AI/ML diagnostic models deployed on existing hardware without hardware-software co-design."

