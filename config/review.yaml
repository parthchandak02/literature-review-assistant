research_question: "What is the educational efficacy, user experience, and implementation impact of generative conversational AI tutoring systems on health science students within clinical and didactic learning environments?"
review_type: "systematic"

# Living review settings (optional)
# Set living_review: true to enable incremental updates.
# last_search_date is updated automatically after each run.
living_review: false
last_search_date: null

pico:
  population: "Health science students including medical, nursing, pharmacy, allied health, dental, and public health trainees."
  intervention: "Conversational AI tutors, Large Language Models (LLMs), and generative AI-driven pedagogical agents."
  comparison: "Traditional educational methods, non-AI-based virtual patients, static learning materials, or pre-implementation baselines."
  outcome: "Educational efficacy (test scores, diagnostic accuracy), user experience (satisfaction, trust, empathy), and implementation metrics (hallucination rates, latency, workflow integration)."

keywords:
  - "conversational AI"
  - "generative AI"
  - "LLM"
  - "chatbot"
  - "virtual patient"
  - "pedagogical agent"
  - "ChatGPT"
  - "Claude"
  - "Gemini"
  - "AMIE"
  - "tutor"
  - "tutoring"
  - "didactic"
  - "clinical"
  - "OSCE"
  - "hallucination"
  - "diagnostic"
  - "reasoning"
  - "medical education"
  - "nursing education"
  - "pharmacy education"
  - "health science"
  - "conversational"
  - "generative"
  - "virtual"
  - "agent"
  - "education"
  - "nursing"
  - "pharmacy"
  - "science"

domain: "Health professions education and medical training technology."
scope: "This review covers the application of generative conversational AI systems in the training of health science students. It examines both didactic knowledge acquisition and clinical reasoning practice in simulated environments. The scope includes educational outcomes, user-perceived experience, and technical implementation challenges such as hallucination and workflow integration."

inclusion_criteria:
  - "Studies must evaluate a generative conversational AI system used for educational purposes."
  - "The target population must be students enrolled in health science degree programs."
  - "The study must report quantitative or qualitative data on educational efficacy, user experience, or implementation impact."
  - "Peer-reviewed journal articles, conference proceedings, and preprints are eligible for inclusion."
  - "Studies must be published in the English language."
  - "Research must be conducted in either clinical simulation or didactic learning settings."

exclusion_criteria:
  - "Studies focusing on rule-based chatbots or non-generative decision-tree scripts are excluded."
  - "Research involving static virtual patient software without conversational AI capabilities is excluded."
  - "Papers evaluating AI tools used solely for administrative tasks like scheduling or billing are excluded."
  - "Studies focusing on non-conversational clinical decision support systems (CDSS) are excluded."
  - "Editorials, opinion pieces, and non-empirical literature reviews are excluded."
  - "Studies where the AI intervention is not specifically applied to health science student training are excluded."

date_range_start: 2000
date_range_end: 2026

target_databases:
  - scopus
  - openalex
  - pubmed
  - semantic_scholar
  - ieee_xplore
  - clinicaltrials_gov

target_sections:
  - abstract
  - introduction
  - methods
  - results
  - discussion
  - conclusion

