name: Config Benchmark Gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  benchmark-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Setup Python
        run: uv python install 3.13

      - name: Run benchmark gate unit tests
        run: uv run pytest tests/unit/test_benchmark_config_generator.py
