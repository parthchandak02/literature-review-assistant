# Commit-time checks (install: uv run pre-commit install)
default_language_version:
  python: python3.11

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: frontend-lint
        name: frontend lint (pnpm)
        entry: pnpm -C frontend lint
        language: system
        pass_filenames: false
        files: ^frontend/

      - id: frontend-typecheck
        name: frontend typecheck (pnpm)
        entry: pnpm -C frontend typecheck
        language: system
        pass_filenames: false
        files: ^frontend/
